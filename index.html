<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <style>
        body {
            background-color: #f1f3f7;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background-color: #fff;
            width: 800px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #93b95e;
            color: black;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }

        .form-body {
            padding: 30px 50px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group label {
            width: 180px;
            font-weight: normal;
            font-size: 16px;
        }

        .form-control {
            flex: 1;
            border: none;
            border-bottom: 1px solid #333;
            padding: 5px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        .radio-group, .checkbox-group {
            flex: 1;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        textarea.form-control {
            border: 1px solid #333;
            height: 120px;
            margin-top: 5px;
        }

        .textarea-group {
            display: block;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-bottom: 15px; /* Giảm nhẹ padding để nhường chỗ cho link */
        }

        .btn {
            padding: 10px 30px;
            border: 1px solid #333;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            background-color: #93b95e;
            color: black;
        }

        /* PHẦN MỚI THÊM: Định dạng link chuyển trang */
        .login-redirect {
            text-align: center;
            padding-bottom: 25px;
            font-size: 15px;
        }

        .login-redirect a {
            color: #5d7c32; /* Màu xanh đậm hơn một chút để dễ nhìn */
            font-weight: bold;
            text-decoration: none;
        }

        .login-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h1>Thông tin đăng ký</h1>
    </div>

    <div class="form-body">
        <!-- (Các trường nhập liệu giữ nguyên như cũ) -->
        <div class="form-group">
            <label>Họ tên:</label>
            <input type="text" class="form-control" placeholder="Nhập họ tên">
        </div>
        <div class="form-group">
            <label>Ngày sinh:</label>
            <input type="date" class="form-control">
        </div>
        <div class="form-group">
            <label>Giới tính:</label>
            <div class="radio-group">
                <label><input type="radio" name="gender"> Nam</label>
                <label><input type="radio" name="gender"> Nữ</label>
            </div>
        </div>
        <div class="form-group">
            <label>Địa chỉ:</label>
            <input type="text" class="form-control" placeholder="Nhập địa chỉ">
        </div>
        <div class="form-group">
            <label>MSSV:</label>
            <input type="text" class="form-control" placeholder="Nhập mã số sinh viên">
        </div>
        <div class="form-group">
            <label>Lớp:</label>
            <select class="form-control">
                <option>DA25TTC</option>
            </select>
        </div>
        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="text" class="form-control" placeholder="Nhập số điện thoại">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" class="form-control" placeholder="Nhập email">
        </div>
        <div class="form-group">
            <label>Ảnh đại diện:</label>
            <input type="file" class="form-control">
        </div>
        <div class="form-group">
            <label>Sở trường:</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> Thiết kế web</label>
                <label><input type="checkbox"> Lập trình web</label>
                <label><input type="checkbox"> Thành thạo tiếng Trung</label>
            </div>
        </div>
        <div class="form-group textarea-group">
            <label>Mô tả sơ lược:</label>
            <textarea class="form-control"></textarea>
        </div>
    </div>

    <!-- Khu vực nút bấm -->
    <div class="footer-buttons">
        <!-- Hủy bỏ cũng có thể cho quay về trang đăng nhập -->
        <button class="btn" onclick="window.location.href='login.html'">Hủy bỏ</button>
        <button class="btn">Đăng ký</button>
    </div>

    <!-- PHẦN MỚI THÊM: Liên kết quay lại trang đăng nhập -->
    <div class="login-redirect">
        Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
